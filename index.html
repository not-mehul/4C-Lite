<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Column Analyzer</title>
    <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/string-similarity@2.0.0/umd/string-similarity.min.js"></script>
    <script defer src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-50 text-gray-900">
<header class="p-4 bg-white shadow">
    <h1 class="text-xl font-bold">CSV Column Analyzer</h1>
    <p>Compatibility CSV last updated: <span id="lastUpdated">Loading...</span></p>
</header>

<main class="p-6 grid gap-6" role="main" aria-label="CSV Analyzer">
    <section>
        <label for="fileInput" class="block mb-2 font-medium">Upload or Drag & Drop CSV</label>
        <div id="dropZone" class="border-dashed border-2 border-gray-400 rounded p-6 text-center">
            <p>Drop file here or <button id="browseBtn" class="text-blue-600 underline">browse</button></p>
            <input id="fileInput" type="file" accept=".csv" class="hidden" />
        </div>
        <p id="message" class="mt-2 text-red-600" role="alert"></p>
    </section>

    <section id="previewSection" aria-label="CSV Preview">
        <h2 class="font-semibold mb-2">Preview</h2>
        <div id="preview"></div>
    </section>

    <section id="resultSection" aria-label="Analysis Results">
        <h2 class="font-semibold mb-2">Results</h2>
        <div id="result"></div>
    </section>
</main>
</body>
</html>
